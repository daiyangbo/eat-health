# 基米吃饭 - 训练配置文件
# 用于 LLaMA-Factory SFT 微调

# 模型配置
model_name_or_path: ./models/base/qwen2.5-1.5b

# 数据配置
dataset_dir: ./data/processed
dataset: train_llama
eval_dataset: val_llama
template: qwen
finetuning_type: lora

# 输出配置
output_dir: ./models/finetuned
logging_dir: ./logs

# 训练参数
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
num_train_epochs: 3
learning_rate: 1.0e-5
lr_scheduler_type: cosine
warmup_steps: 100
weight_decay: 0.01

# 保存配置
save_steps: 500
save_total_limit: 2
save_strategy: steps

# 日志配置
logging_steps: 10
report_to: none

# 精度配置
bf16: true

# 其他配置
seed: 42
dataloader_num_workers: 4
remove_unused_columns: false

# 评估配置
# 使用单独的验证文件，不需要从训练数据中分割
eval_strategy: steps
eval_steps: 500
